services:
  db:
    image: postgis/postgis:16-3.5
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: letscycle
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d letscycle']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    image: letscycle-backend
    ports:
      - '3000:3000'
    environment:
      # Container-to-container DB address (service name `db`).
      DATABASE_URL: postgresql://postgres:postgres@db:5432/letscycle
      NODE_ENV: development
      # FRONTEND_ORIGIN intentionally unset for the local stack so CORS reflects
      # any dev origin (localhost / 127.0.0.1 / LAN IP). Pin it in real envs.
      # Set GOOGLE_CLIENT_ID in your shell to enable "Continue with Google".
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Dev-only password seeded for existing users on boot (see server.ts).
      AUTH_DEV_DEFAULT_PASSWORD: ${AUTH_DEV_DEFAULT_PASSWORD:-letscycle-dev}
    volumes:
      # Persist dev-uploaded media across backend rebuilds/restarts.
      - uploaddata:/app/uploads
      # Persist dummy-Cognito accounts so email/password logins survive restarts.
      - authdata:/app/.devstate
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dbdata:
  uploaddata:
  authdata:

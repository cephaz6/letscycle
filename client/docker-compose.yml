# Run the LetsCycle web app in a container:
#
#   cd client && docker compose up --build
#   open http://localhost:3001
#
# The browser calls the API directly, so NEXT_PUBLIC_API_BASE_URL points at the
# host's backend (run `npm run dev` in ../backend). Override it for other envs:
#
#   NEXT_PUBLIC_API_BASE_URL=https://api.example.com/api/v1 docker compose up --build

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000/api/v1}
    image: letscycle-web
    ports:
      - '3001:3001'
    restart: unless-stopped
